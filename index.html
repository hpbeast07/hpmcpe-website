<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HPmcpe Merged</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cinzel:wght@600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <input id="ignInput" placeholder="IGN" oninput="onIgn(this.value)">
  <input id="passInput" placeholder="Password" type="password">
  <button id="enterBtn" onclick="doLogin()">ENTER</button>
  <div id="loginMsg"></div>
</div>

<!-- MAIN -->
<div id="screen-main">
  <h1 id="heroWelcome"></h1>
  <span id="navIgn"></span>
  <span id="onlineCnt"></span>
  <button onclick="doLogout()">Logout</button>
</div>

<script src="script.js"></script>
</body>
</html>
